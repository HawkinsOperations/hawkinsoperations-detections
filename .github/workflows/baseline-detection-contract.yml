name: baseline-detection-contract

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  baseline-detection-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install verifier dependencies
        run: python3 -m pip install --disable-pip-version-check pyyaml
      - name: Validate Detection Contract
        run: python3 ./scripts/verify_detection_contract.py
