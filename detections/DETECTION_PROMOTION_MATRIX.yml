schema_version: phase2c-detection-promotion-matrix-v1
owner_repo: hawkinsoperations-detections
truth_surface: detection_source
enforcement_status: SOURCE_CONTRACT_ENFORCED
human_review_required: true
claim_boundary:
  repo_truth_is_not_runtime_truth: true
  source_exists_is_not_validation: true
  validation_is_not_signal_observation: true
  website_rendering_is_not_proof: true
  proof_records_authorize_claim_ceilings: true
  public_safe_status: NOT_PUBLIC_SAFE
allowed_status_values:
  source_status:
    - SOURCE_EXISTS
    - VALIDATION_PLANNED
    - BOUNDARY_CONTRACT_ONLY
    - EXTERNAL_BOUNDARY_CONTRACT
  public_safe_status:
    - NOT_PUBLIC_SAFE
  runtime_active:
    - false
  signal_observed:
    - false
ledger_boundary:
  detections_repo_scope: SOURCE_SIDE_ELIGIBILITY_AND_READINESS_METADATA_ONLY
  canonical_lifetime_case_ledger_owner: hawkinsoperations-platform
  does_not_claim_canonical_ledger_state: true
  does_not_append_ledger_entries: true
ledger_eligibility_status_values:
  - APPENDED
  - DRY_RUN_READY
  - VALIDATION_READY
  - PROOF_RECORDED
  - BLOCKED
  - NEEDS_TELEMETRY_CONTRACT
  - FUTURE_CANDIDATE
detection_side_ledger_eligibility:
  appended: []
  dry_run_ready:
    - ID-DET-001
    - ID-DET-002
    - ID-DET-003
    - ID-DET-004
  validation_ready:
    - HO-DET-013
  proof_recorded:
    - HOD-001
    - HO-DET-001
    - HO-DET-011
    - HO-DET-012
    - AWS-DET-001
  blocked:
    - HO-NDR-001
  needs_telemetry_contract:
    - HO-DET-014
    - HO-DET-015
    - HO-DET-016
    - HO-NDR-002
    - HO-PIPE-001
  future_candidate:
    - HO-DET-002
    - HO-DET-003
    - HO-DET-004
    - HO-DET-005
    - HO-DET-006
    - HO-DET-007
    - HO-DET-008
    - HO-DET-009
    - HO-DET-010
