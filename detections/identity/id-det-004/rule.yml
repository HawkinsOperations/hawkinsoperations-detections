  - attack.t1539
  - attack.t1550
mitre_attack:
  mapping_status: SOURCE_MAPPING_PLANNED_VALIDATION
  technique_ids:
    - T1078
    - T1539
    - T1550
  technique_names:
    - Valid Accounts
    - Steal Web Session Cookie
    - Use Alternate Authentication Material
logsource:
  product: identity
  category: session
  definition: >
    Controlled identity-event records with authentication result, country or
    region context, location velocity, device state, ASN category, user-agent
    family, session identifier, and approved travel or proxy context.
data_source:
  primary:
    product: identity
    event_family: identity_travel_session_context
backend_target: generic_yaml_source_record
mapped_fields:
  - event_type
  - identity
  - auth_result
  - source_country
  - previous_country
  - source_region
  - previous_region
  - impossible_travel
  - location_velocity_kmh
  - known_device
  - source_asn_category
  - previous_asn_category
  - asn_category_changed
  - user_agent_family
  - previous_user_agent_family
  - user_agent_changed
  - session_id
  - session_reuse
  - approved_travel
  - expected_vpn
  - known_corporate_proxy
  - maintenance_window
  - risk_level
  - detection_expected
source_assumptions:
  - A country or region change alone is not sufficient for a match.
  - Impossible travel and anomalous session context require provider-specific tuning.
  - Approved travel, known VPN, and corporate proxy contexts require local allowlisting.
  - Live IdP, SIEM, SOAR, or runtime routing is not part of this source artifact.
current_scope:
  phase: CONTROLLED_TEST_VALIDATED
  summary: Source package plus controlled identity-event fixture validation only.
not_claimed_here:
  - live IdP proof
  - live SIEM/NDR observation
  - production identity coverage
  - complete identity-attack coverage
  - impossible-travel completeness
  - session hijacking completeness
  - autonomous SOC operation
  - disposition authority
  - proof promotion
  - public-safe status
logic_summary: >
  Match successful identity/session activity when impossible travel, high
  location velocity, new-country plus new-device context, or session reuse after
  ASN and user-agent shift is present and approved travel, VPN, proxy, or
  maintenance context is absent.
detection:
  selection_successful_identity_activity:
    event_type:
      - login
      - session_activity
    auth_result: success
  selection_impossible_travel:
    impossible_travel: true
  selection_high_location_velocity:
    location_velocity_kmh_gte: 800
  selection_new_country_new_device:
    known_device: false
    country_changed: true
  selection_session_context_shift:
    session_reuse: true
    asn_category_changed: true
    user_agent_changed: true
  filter_approved_travel:
    approved_travel: true
  filter_expected_vpn:
    expected_vpn: true
  filter_known_corporate_proxy:
    known_corporate_proxy: true
  filter_maintenance_window:
    maintenance_window: true
  condition: >
    selection_successful_identity_activity and
    (
      selection_impossible_travel or
      selection_high_location_velocity or
      selection_new_country_new_device or
      selection_session_context_shift
    ) and not
    (
      filter_approved_travel or
      filter_expected_vpn or
      filter_known_corporate_proxy or
      filter_maintenance_window
    )
falsepositives:
  - Known-device VPN or expected egress country change.
  - Approved business travel.
  - Corporate proxy or identity-provider egress changes.
  - Maintenance or test sessions.
tuning_guidance:
  suspicious_context_review:
    - Require successful authentication plus impossible-travel or anomalous context.
    - Prioritize high velocity, new-country with unknown device, and session reuse after ASN and user-agent shift.
    - Tune velocity and country-change thresholds per identity-provider semantics.
  benign_review_patterns:
    - Approved travel windows.
    - Expected VPN or corporate proxy egress.
    - Known-device context with stable user-agent family.
    - Approved maintenance or test sessions.
level: medium
supported_claim: ID-DET-004 source artifacts exist and controlled validation passed for 10 controlled identity-event fixtures covering impossible travel or anomalous session context.
