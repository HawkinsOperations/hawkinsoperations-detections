title: ID-DET-004 Impossible Travel or Anomalous Session Context
detection_id: ID-DET-004
name: Impossible Travel or Anomalous Session Context
status: experimental/controlled-test-validated
proof_level: CONTROLLED_TEST_VALIDATED
trust_class: CONTROLLED_TEST_VALIDATED
