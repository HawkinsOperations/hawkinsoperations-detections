signal_observed: false
evidence_linked_public_proof: false
claim_ceiling: CONTROLLED_TEST_VALIDATED
objective: >
  Detect controlled identity/session records where successful authentication
  includes impossible travel, high location velocity, or session context shifts.
core_argument: A successful session is not proof that the user context is normal.
author: HawkinsOperations
date: 2026-05-20
references:
