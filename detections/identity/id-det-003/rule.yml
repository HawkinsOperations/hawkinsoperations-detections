  definition: >
    Controlled identity administration records with actor, target identity,
    role, group, entitlement, action result, approval context, and maintenance
    context.
data_source:
  primary:
    product: identity
    event_family: identity_privilege_change
backend_target: generic_yaml_source_record
mapped_fields:
  - event_type
  - actor_identity
  - target_identity
  - action
  - action_result
