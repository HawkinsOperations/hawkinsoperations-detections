  - detection_expected
source_assumptions:
  - Privilege change events must include enough role, group, or entitlement context for review.
  - Approved just-in-time, change-ticket, break-glass, and maintenance contexts require local tuning.
  - Live IdP, SIEM, SOAR, or runtime routing is not part of this source artifact.
current_scope:
  phase: CONTROLLED_TEST_VALIDATED
  summary: Source package plus controlled identity administration fixture validation only.
not_claimed_here:
  - live IdP proof
  - live SIEM/NDR observation
  - production identity coverage
  - complete identity-attack coverage
  - autonomous SOC operation
  - disposition authority
  - proof promotion
  - public-safe status
logic_summary: >
  Match controlled identity administration events when a privileged role, admin
  group, or sensitive entitlement is assigned or added and approved-change
  context is absent.
detection:
  selection_privilege_change_event:
    event_type:
      - role_assignment
      - admin_group_change
      - entitlement_grant
    action_result: success
  selection_privileged_role:
    privileged_role: true
  selection_admin_group:
    admin_group: true
  selection_sensitive_entitlement:
    sensitive_entitlement: true
  filter_approved_jit:
    just_in_time_request: true
  filter_approved_change:
    approved_change_ticket: true
  filter_breakglass_exercise:
    breakglass_exercise: true
  filter_expected_maintenance:
    maintenance_window: true
    expected_admin_actor: true
  condition: >
    selection_privilege_change_event and
    (
      selection_privileged_role or
      selection_admin_group or
      selection_sensitive_entitlement
    ) and not
    (
      filter_approved_jit or
      filter_approved_change or
      filter_breakglass_exercise or
      filter_expected_maintenance
    )
falsepositives:
  - Approved just-in-time privilege assignment.
  - Documented change-ticket driven role or group update.
  - Break-glass access exercise.
  - Expected maintenance by an approved administrative actor.
tuning_guidance:
  suspicious_context_review:
    - Require successful privilege-changing action plus privileged role, group, or entitlement context.
    - Prioritize changes to persistent admin roles and high-risk target identities.
    - Tune role and group lists per identity platform and organization.
  benign_review_patterns:
    - Approved just-in-time grants.
    - Ticketed role changes.
    - Break-glass drills with explicit approval.
    - Expected maintenance windows by known administrative actors.
level: high
