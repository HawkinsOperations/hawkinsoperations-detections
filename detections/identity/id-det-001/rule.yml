    claim_ceiling: PRIVATE_RUNTIME_METADATA_CAPTURED if receipt exists.
    boundary: No live SIEM/NDR public proof in this PR. No full route proof unless later separately captured and reviewed.
not_claimed_here:
  - live IdP proof
  - live SIEM/NDR observation
  - production identity coverage
  - complete identity-attack coverage
  - autonomous SOC operation
  - disposition authority
  - proof promotion
  - public-safe status
  - website/public-surface publication
logic_summary: >
  Match successful identity/session events only when suspicious context
  combinations are present, such as impossible travel, new device with ASN
  category shift, service-account interactive use, out-of-scope AI or agent
  privileged action, or session reuse after user-agent and ASN category shift.
detection:
  selection_successful_identity_activity:
    event_type:
      - login
      - session_activity
    auth_result: success
  selection_impossible_travel:
    impossible_travel: true
  selection_new_device_new_asn:
    known_device: false
    source_asn_changed: true
  selection_service_account_interactive:
    identity_type: service_account
    action_after_login: interactive_console
    expected_automation: false
  selection_ai_agent_out_of_scope_privileged_action:
    identity_type: ai_agent
    privileged_action: true
    approved_tool_scope: false
  selection_session_reuse_context_shift:
    session_reuse: true
    user_agent_changed: true
    asn_category_changed: true
  filter_expected_vpn_known_device:
    known_device: true
    source_asn_category: expected_vpn
  filter_expected_automation:
    expected_automation: true
  filter_approved_tool_scope:
    approved_tool_scope: true
  filter_maintenance_window:
    maintenance_window: true
  condition: >
    selection_successful_identity_activity and
    (
      selection_impossible_travel or
      selection_new_device_new_asn or
      selection_service_account_interactive or
      selection_ai_agent_out_of_scope_privileged_action or
      selection_session_reuse_context_shift
    ) and not
    (
      filter_expected_vpn_known_device or
      filter_expected_automation or
      filter_approved_tool_scope or
      filter_maintenance_window
    )
falsepositives:
  - Expected VPN country changes on known devices.
  - Approved automation by service accounts.
  - Approved agent tool usage inside documented scope.
  - Privileged administrative activity during approved maintenance windows.
  - Identity-provider risk scoring or device state drift that requires local tuning.
tuning_guidance:
  suspicious_context_review:
    - Require successful authentication plus suspicious session context.
    - Prioritize impossible travel, new device plus ASN shift, service-account interactive use, out-of-scope agent privileged actions, and session reuse after context shift.
  benign_review_patterns:
    - Known-device VPN usage with expected ASN category.
    - Expected automation for service accounts.
    - Approved tool scope for AI or agent identities.
    - Privileged actions during approved maintenance windows.
level: medium
