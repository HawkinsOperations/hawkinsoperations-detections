source_assumptions:
  - Successful authentication alone is not sufficient for a match.
  - Context combinations are required to distinguish suspicious identity activity from expected access.
  - Device, ASN, user-agent, session, and automation context may vary by identity platform and collector.
  - Live IdP, SIEM, SOAR, or runtime routing is not part of this source artifact.
