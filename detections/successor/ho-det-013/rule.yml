  - autonomous SOC operation
  - disposition authority
logic_summary: >
  Flag process, service, registry, policy, or event-log activity that appears to
  stop, disable, impair, clear, reconfigure, or blind endpoint telemetry and
  security controls. Prioritize activity that targets Sysmon, Splunk Universal
  Forwarder, Wazuh agent, Defender, Windows Event Log, SecurityHealthService, or
  Microsoft Defender for Endpoint sensor service names.
detection:
  selection_process_creation:
    EventID:
      - 1
      - 4688
  selection_service_control_process:
    Image|endswith:
      - '\sc.exe'
      - '\net.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\taskkill.exe'
      - '\cmd.exe'
  selection_event_log_process:
    Image|endswith:
      - '\wevtutil.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_registry_policy_process:
    Image|endswith:
      - '\reg.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_service_stop_or_disable_command:
    CommandLine|contains:
      - 'sc stop'
      - 'sc.exe stop'
      - 'sc config'
      - 'start= disabled'
      - 'start=disabled'
      - 'net stop'
      - 'Stop-Service'
      - 'Set-Service'
      - 'StartupType Disabled'
      - 'Set-ItemProperty'
      - 'taskkill'
      - '/f /im'
  selection_log_clear_command:
    CommandLine|contains:
      - 'wevtutil cl'
      - 'wevtutil.exe cl'
      - 'Clear-EventLog'
      - 'Remove-EventLog'
      - 'Clear-WinEvent'
      - 'auditpol'
      - '/success:disable'
      - '/failure:disable'
  selection_defender_tamper_command:
    CommandLine|contains:
      - 'Set-MpPreference'
      - 'DisableRealtimeMonitoring'
      - 'DisableBehaviorMonitoring'
      - 'DisableIOAVProtection'
      - 'DisableScriptScanning'
      - 'DisableBlockAtFirstSeen'
      - 'ExclusionPath'
      - 'ExclusionProcess'
      - 'TamperProtection'
  selection_registry_policy_target:
    CommandLine|contains:
      - 'HKLM\SOFTWARE\Policies\Microsoft\Windows Defender'
      - 'HKLM\SOFTWARE\Microsoft\Windows Defender'
      - 'DisableAntiSpyware'
      - 'DisableRealtimeMonitoring'
      - 'Services\Sysmon64'
      - 'Services\SplunkForwarder'
      - 'Services\WazuhSvc'
      - 'Services\WinDefend'
      - 'Services\EventLog'
  selection_security_or_telemetry_target:
    CommandLine|contains:
      - 'Sysmon64'
      - 'sysmon64.exe'
      - 'Sysmon'
      - 'SplunkForwarder'
      - 'splunkd.exe'
      - 'WazuhSvc'
      - 'wazuh-agent.exe'
      - 'WinDefend'
      - 'SecurityHealthService'
      - 'EventLog'
      - 'Sense'
      - 'MsMpEng.exe'
  selection_service_event:
    EventID:
      - 7036
      - 7040
  selection_service_event_target:
    ServiceName|contains:
      - 'Sysmon64'
      - 'Sysmon'
      - 'SplunkForwarder'
      - 'WazuhSvc'
      - 'WinDefend'
      - 'SecurityHealthService'
      - 'EventLog'
      - 'Sense'
  selection_service_event_state:
    ServiceState|contains:
      - 'stopped'
      - 'disabled'
      - 'stop'
    StartType|contains:
      - 'disabled'
  selection_event_log_cleared:
    EventID:
      - 1102
  condition: >
    (selection_process_creation and
      (
        (selection_service_control_process and selection_service_stop_or_disable_command and selection_security_or_telemetry_target) or
        (selection_event_log_process and selection_log_clear_command) or
        (selection_defender_tamper_command) or
        (selection_registry_policy_process and selection_registry_policy_target) or
        (selection_service_control_process and selection_security_or_telemetry_target and selection_registry_policy_target)
      )
    ) or selection_event_log_cleared or
    (selection_service_event and selection_service_event_target and selection_service_event_state)
falsepositives:
  - Approved security-agent upgrade, repair, or maintenance windows.
  - Endpoint management activity that temporarily restarts telemetry agents.
  - Defender policy changes deployed by approved management tooling.
  - Log retention or lab reset activity with documented approval.
  - Troubleshooting by an authorized administrator under a change record.
tuning_guidance:
  suspicious_context_review:
    - Prioritize stop, disable, taskkill, registry policy, Defender preference, and event-log clear commands targeting telemetry or security services.
    - Review user, parent process, remote execution context, change window, and endpoint management origin before escalation.
    - Treat Windows Event Log clearing as high-interest review context even when endpoint identity and parent process require enrichment.
    - Treat Defender exclusions and disable-preference strings as review candidates until validated against approved policy tooling.
  benign_review_patterns:
    - Approved agent upgrades or controlled lab maintenance.
    - Endpoint management platforms restarting agents during deployment.
    - Approved Defender policy baselines.
    - Documented log retention, rotation, or lab reset activity.
