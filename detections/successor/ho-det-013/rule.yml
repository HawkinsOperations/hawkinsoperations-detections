title: HO-DET-013 Defense Tool and Telemetry Tamper Attempt
detection_id: HO-DET-013
name: Defense Tool and Telemetry Tamper Attempt
status: experimental/source-validation-planned
proof_level: SOURCE_EXISTS
trust_class: SOURCE_EXISTS
public_safe_status: NOT_PUBLIC_SAFE
approval_status: NOT_APPROVED
