logsource:
  product: windows
  definition: >
    Intended source telemetry includes Windows process creation, Sysmon Event
    ID 1 where available, Windows Security and System service-control events
    where available, Windows event-log clearing telemetry, Defender operational
    context where available, and Wazuh/Splunk/Sysmon pipeline context as planned
    telemetry only.
data_source:
  primary:
    product: windows
    event_family: process_creation
    event_ids:
      - 1
      - 4688
  related:
    - product: windows
      channel: System
      event_ids:
        - 7036
        - 7040
    - product: windows
      channel: Security
      event_ids:
        - 1102
        - 4688
    - product: windows
      channel: Microsoft-Windows-Windows Defender/Operational
      event_family: defender_operational_context
backend_target: generic_yaml_source_record
source_assumptions:
  - Matching is intended to be case-insensitive where the backend supports it.
  - Process creation command line is the primary source for command-pattern logic.
  - Service-control event fields may identify service name, display name, start type, or state change where collected.
  - Event-log clear events can appear in Security, System, or PowerShell-related sources depending on collection.
  - Defender operational context varies by endpoint policy and collection configuration.
  - Wazuh, Splunk, and Sysmon references describe intended telemetry surfaces only and do not prove live ingestion.
  - Registry and policy indicators are source strings for detection logic, not instructions to change controls.
  - Backend-specific routing, deployment, tuning, and validation are not part of this source artifact.
current_scope:
  phase: SOURCE_EXISTS
  summary: Source package only; validation fixtures and reports are pending under separate validation scope.
not_claimed_here:
  - controlled-test validation
  - runtime observation
  - signal observation
  - live SIEM ingestion
  - live Splunk proof
  - live Wazuh proof
  - live Defender proof
  - live Security Onion proof
  - evidence-linked public proof
  - public-safe proof
  - production coverage
