validation_status: VALIDATION_PLANNED
signal_observed: false
evidence_linked_public_proof: false
claim_ceiling: SOURCE_EXISTS
description: >
  Source-only detection record for suspicious attempts to stop, disable,
  impair, clear, reconfigure, or blind endpoint telemetry and security controls
  in the HawkinsOperations Windows lab. This source uses process creation,
  service-control, event-log clearing, registry or policy edit, and Defender
  preference tamper patterns where telemetry is available. It does not establish
  runtime, signal, validation, routing, evidence, production coverage, or
  public-safe proof claims.
author: HawkinsOperations
date: 2026-05-20
references:
  - https://attack.mitre.org/techniques/T1562/001/
  - https://attack.mitre.org/techniques/T1070/001/
  - https://attack.mitre.org/techniques/T1112/
  - https://attack.mitre.org/techniques/T1059/001/
