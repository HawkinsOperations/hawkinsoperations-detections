title: Suspicious PowerShell Encoded Command Execution
id: 7e21fda5-6f4e-4eb5-b0db-6d5f6a74d001
status: experimental
description: Detects PowerShell or pwsh process executions using encoded command patterns.
references:
  - https://attack.mitre.org/techniques/T1059/001/
author: HawkinsOperations
date: 2026-04-21
modified: 2026-04-21
tags:
  - attack.execution
  - attack.t1059.001
  - attack.ta0002
logsource:
  product: windows
  category: process_creation
detection:
  selection_image:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_cli:
    CommandLine|contains:
      - ' -enc '
      - ' -encodedcommand '
      - 'FromBase64String('
  condition: selection_image and selection_cli
falsepositives:
  - Administrative automation using encoded scripts
level: high

